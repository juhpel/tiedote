<!DOCTYPE html>
<html>
<head>
    <title>Ladataan tiedostoa...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: white; cursor: pointer; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .fake-content { display: flex; align-items: center; justify-content: center; height: 100%; font-family: sans-serif; color: #333; }
    </style>
</head>
<body onclick="launchRoll()">

    <div id="fake" class="fake-content">
        <p>Paina saadaksesi helvetillinen määrä tietoa tahtikoneista <br> <strong>😏trust me bro</strong></p>
    </div>

    <div id="video-container">
        <iframe id="player" width="100%" height="100%" src="" frameborder="0" allow="autoplay"></iframe>
    </div>

    <script>
        function launchRoll() {
            document.getElementById('fake').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            // Ladataan video vasta klikkauksesta äänien kanssa
            document.getElementById('player').src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&modestbranding=1";
        }
    </script>
</body>
</html>
