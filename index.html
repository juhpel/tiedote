<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Sähkökoneet: Syvällinen Analyysi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f4f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #troll-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            border: none;
            padding: 20px;
            box-sizing: border-box;
        }

        #motor-image {
            max-width: 80%;
            max-height: 60vh;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        #trigger-text {
            font-size: 24px;
            color: #333;
            text-align: center;
            line-height: 1.5;
            max-width: 600px;
        }

        #trigger-text strong {
            color: #0056b3;
            font-size: 28px;
        }

        /* TÄRKEÄ: Lokaalin videon tyylit */
        #rick-video {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Täyttää koko ruudun ilman mustia palkkeja */
            background: black;
        }
    </style>
</head>
<body>

    <button id="troll-trigger" onclick="pamahtaakäyntiin()">
        <img id="motor-image" src="https://mechtex.com/uploads/images/202401/image_750x_65a4ef1c836e9.jpg" alt="Tahtikoneen poikkileikkaus">
        
        <div id="trigger-text">
            <p>Paina saadaksesi helvetillinen määrä tietoa tahtikoneista <br> <strong>😏trust me bro</strong></p>
        </div>
    </button>

    <video id="rick-video" preload="auto">
        <source src="rickroll.mp4" type="video/mp4">
        Selaimesi ei tue videota.
    </video>

    <script>
        function pamahtaakäyntiin() {
            const trigger = document.getElementById('troll-trigger');
            const video = document.getElementById('rick-video');

            // 1. Piilotetaan hämäys ja näytetään video
            trigger.style.display = 'none';
            video.style.display = 'block';

            // 2. Käynnistetään video
            video.play();
            video.loop = true; // Jatketaan kunnes uhri luovuttaa

            // 3. Vapaaehtoinen: Pakotetaan koko ruutu (toimii useimmissa selaimissa klikkauksesta)
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
        }
    </script>
</body>
</html>
